<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVING ROOM TENNIS · scoreboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #030614;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* main app container - fullscreen ready */
        .app {
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            max-height: 100%;
            position: relative;
            overflow: hidden;
            background: radial-gradient(ellipse at 30% 40%, #1a2f4a, #030814);
        }

        /* screens container */
        .screens {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* base screen style */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 24px;
            display: flex;
            flex-direction: column;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s cubic-bezier(0.2, 0.9, 0.3, 1), visibility 0.4s;
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
            z-index: 10;
        }

        /* content cards */
        .content-card {
            background: rgba(12, 22, 38, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(90, 140, 220, 0.2);
            border-radius: 48px;
            padding: 32px;
            box-shadow: 0 30px 50px -20px black;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ========== MATCH SCREEN ========== */
        .match-screen {
            background: transparent;
            justify-content: center;
            align-items: center;
        }

        .scoreboard-container {
            width: 100%;
            max-width: 1100px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 80px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 40px 70px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            animation: floatIn 0.5s ease-out;
        }

        @keyframes floatIn {
            0% { opacity: 0; transform: scale(0.96) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            color: #8da9db;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .games-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin: 20px 0 30px;
        }

        .games-player {
            flex: 1;
            text-align: center;
        }

        .games-name {
            font-size: 2.8rem;
            font-weight: 600;
            color: white;
            text-shadow: 0 0 20px rgba(70, 130, 255, 0.5);
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ffffff, #d0e0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .games-number {
            font-size: 9rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #f0f4ff, #99bbff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 10px #1e3a5f);
        }

        .games-divider {
            font-size: 5rem;
            color: #3f5e89;
            font-weight: 200;
        }

        .points-row {
            display: flex;
            justify-content: center;
            gap: 60px;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px 40px;
            border-radius: 100px;
            margin: 30px 0;
            border: 1px solid #2c4162;
        }

        .points-item {
            text-align: center;
        }

        .points-label {
            color: #9ab3dd;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        .points-value {
            font-size: 4.5rem;
            font-weight: 700;
            color: white;
            line-height: 1;
            min-width: 90px;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 30px 0 10px;
        }

        .btn-score {
            border: none;
            background: linear-gradient(145deg, #2b3f60, #1b2a44);
            color: white;
            font-size: 1.8rem;
            font-weight: 700;
            padding: 30px 50px;
            border-radius: 100px;
            cursor: pointer;
            transition: 0.1s ease;
            border: 1px solid #5f7db0;
            box-shadow: 0 10px 0 #0f1a2c, 0 10px 25px black;
            flex: 1 1 250px;
        }

        .btn-score:active {
            transform: translateY(8px);
            box-shadow: 0 2px 0 #0f1a2c, 0 5px 15px black;
        }

        .btn-score.primary {
            background: linear-gradient(145deg, #3e5f96, #26437a);
            border-color: #99bbff;
        }

        .btn-score.warning {
            background: linear-gradient(145deg, #7a4a3e, #5a332a);
            border-color: #d99b8f;
        }

        .match-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            color: #6a85af;
            flex-wrap: wrap;
            gap: 10px;
        }

        .nav-icon {
            background: rgba(20, 35, 60, 0.8);
            border: 1px solid #3f5c88;
            color: white;
            padding: 16px 28px;
            border-radius: 60px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(8px);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .nav-icon:hover {
            background: #2b4168;
            border-color: #7b9edf;
        }

        /* ========== WINNER NOTIFICATION ========== */
        .winner-notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, #2a4a6e, #1a3555);
            border: 3px solid #ffd966;
            border-radius: 100px;
            padding: 40px 80px;
            box-shadow: 0 30px 50px black, 0 0 50px rgba(255, 215, 0, 0.5);
            z-index: 1000;
            text-align: center;
            animation: popIn 0.3s ease;
            display: none;
        }

        .winner-notification.show {
            display: block;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .winner-text {
            font-size: 4rem;
            font-weight: 800;
            color: #ffecb3;
            text-shadow: 0 0 20px gold;
            margin-bottom: 20px;
        }

        .winner-name {
            font-size: 5rem;
            font-weight: 900;
            color: white;
            background: linear-gradient(135deg, #fffacd, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .winner-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .winner-btn {
            background: #2f4b7a;
            border: 2px solid #aac5ff;
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            padding: 20px 40px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s;
        }

        .winner-btn.save {
            background: #2d6a4f;
            border-color: #a5f0c5;
        }

        .winner-btn.dismiss {
            background: #6a3d3d;
            border-color: #ffa5a5;
        }

        /* ========== PLAYER SELECT SCREEN ========== */
        .select-screen {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-selector-card {
            background: rgba(15, 25, 45, 0.9);
            border-radius: 70px;
            padding: 50px;
            width: 90%;
            max-width: 900px;
            border: 1px solid #4060a0;
            animation: scaleIn 0.4s ease;
        }

        @keyframes scaleIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .selector-title {
            color: white;
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 40px;
            text-align: center;
        }

        .selector-row {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .selector-col {
            flex: 1 1 250px;
        }

        .selector-label {
            color: #b0c8f0;
            font-size: 1.2rem;
            margin-bottom: 15px;
            margin-left: 10px;
        }

        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            background: #0d1a2f;
            border-radius: 40px;
            padding: 20px;
            border: 1px solid #33507a;
            max-height: 300px;
            overflow-y: auto;
        }

        .player-tile {
            background: #1a2b48;
            border: 2px solid #2d4470;
            border-radius: 40px;
            padding: 16px 10px;
            text-align: center;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 4px 0 #0f1a30;
        }

        .player-tile.selected {
            background: #3f65a8;
            border-color: #aac5ff;
            transform: scale(1.02);
            box-shadow: 0 0 20px #4f8fff;
        }

        .start-match-btn {
            background: linear-gradient(145deg, #3d6b42, #23552a);
            border: none;
            color: white;
            font-size: 2rem;
            font-weight: 700;
            padding: 30px 50px;
            border-radius: 80px;
            width: 100%;
            cursor: pointer;
            border: 1px solid #8fca95;
            box-shadow: 0 10px 0 #153818;
            transition: 0.1s;
        }

        .start-match-btn:active {
            transform: translateY(8px);
            box-shadow: 0 2px 0 #153818;
        }

        /* ========== LEADERBOARD SCREEN ========== */
        .leaderboard-screen {
            background: rgba(3, 8, 20, 0.9);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 40px;
        }

        .leaderboard-card {
            background: rgba(8, 18, 36, 0.9);
            border-radius: 70px;
            padding: 40px;
            width: 95%;
            max-width: 1300px;
            border: 1px solid #3f6190;
            animation: slideUp 0.4s;
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .leaderboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .leaderboard-title {
            font-size: 2.5rem;
            color: white;
            font-weight: 600;
        }

        .leaderboard-table-wrapper {
            overflow-x: auto;
            border-radius: 40px;
            background: #0b1730;
            padding: 5px;
            margin-bottom: 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1.2rem;
        }

        th {
            text-align: left;
            padding: 22px 16px;
            background: #1b2c4b;
            color: #bfd5ff;
            font-weight: 600;
        }

        td {
            padding: 18px 16px;
            border-bottom: 1px solid #253e64;
            color: #dce6ff;
        }

        .badge-win {
            background: #1d6240;
            color: #b3ffcf;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 700;
        }

        .history-list {
            background: #0a1428;
            border-radius: 40px;
            padding: 20px;
            border: 1px solid #37588b;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            border-bottom: 1px solid #253e64;
            font-size: 1.1rem;
            color: #d0dfff;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .winner-highlight {
            color: #b3ffaa;
            font-weight: 700;
        }

        /* ========== SETTINGS SCREEN ========== */
        .settings-screen {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(25px);
        }

        .settings-card {
            background: #101d36;
            border-radius: 70px;
            padding: 40px;
            max-width: 700px;
            margin: 40px auto;
            border: 1px solid #5573a5;
        }

        .settings-title {
            font-size: 2.5rem;
            color: white;
            margin-bottom: 30px;
        }

        .player-management {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .player-management input {
            flex: 2;
            min-width: 200px;
            background: #1f314f;
            border: 1px solid #5577b3;
            border-radius: 60px;
            padding: 20px 25px;
            font-size: 1.2rem;
            color: white;
        }

        .player-management button {
            flex: 1;
            background: #2e4b82;
            border: none;
            border-radius: 60px;
            padding: 20px 30px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid #8daeec;
        }

        .player-list-settings {
            background: #0b1730;
            border-radius: 40px;
            padding: 20px;
        }

        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #314e7a;
            color: white;
            font-size: 1.2rem;
        }

        .delete-player {
            background: #a03d3d;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }

        .bottom-nav {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: rgba(30, 50, 85, 0.8);
            border: 1px solid #5b7ec2;
            color: white;
            padding: 18px 32px;
            border-radius: 60px;
            font-size: 1.2rem;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: 0.2s;
        }

        .nav-btn:hover {
            background: #3b5790;
        }
    </style>
</head>
<body>
    <!-- WINNER NOTIFICATION MODAL -->
    <div class="winner-notification" id="winnerNotification">
        <div class="winner-text">🏆 WINNER 🏆</div>
        <div class="winner-name" id="winnerName">Player Name</div>
        <div class="winner-actions">
            <button class="winner-btn save" id="saveMatchBtn">✓ save match</button>
            <button class="winner-btn dismiss" id="dismissWinnerBtn">✗ dismiss</button>
        </div>
    </div>

    <div class="app">
        <div class="screens">
            <!-- MATCH SCREEN (main scoreboard) -->
            <div class="screen match-screen" id="matchScreen">
                <div class="scoreboard-container">
                    <div class="match-header">
                        <span>🏆 match</span>
                        <span id="matchPlayersDisplay">— vs —</span>
                        <span>win by 2</span>
                    </div>
                    
                    <div class="games-display">
                        <div class="games-player">
                            <div class="games-name" id="matchPlayerAName">Player A</div>
                            <div class="games-number" id="gamesA">0</div>
                        </div>
                        <div class="games-divider">:</div>
                        <div class="games-player">
                            <div class="games-name" id="matchPlayerBName">Player B</div>
                            <div class="games-number" id="gamesB">0</div>
                        </div>
                    </div>

                    <div class="points-row">
                        <div class="points-item">
                            <div class="points-label">points A</div>
                            <div class="points-value" id="pointsA">0</div>
                        </div>
                        <div class="points-item">
                            <div class="points-label">points B</div>
                            <div class="points-value" id="pointsB">0</div>
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button class="btn-score primary" id="pointAbtn">+1 A</button>
                        <button class="btn-score primary" id="pointBbtn">+1 B</button>
                    </div>

                    <div class="match-footer">
                        <button class="nav-icon" onclick="showScreen('selectScreen')">← change players</button>
                        <button class="nav-icon" onclick="resetPoints()">⟲ reset points</button>
                        <button class="nav-icon" onclick="showWinnerNotification()">🏁 end match</button>
                        <button class="nav-icon" onclick="toggleFullScreen()">⛶ fullscreen</button>
                        <button class="nav-icon" onclick="showScreen('leaderboardScreen')">📊 standings</button>
                    </div>
                </div>
            </div>

            <!-- PLAYER SELECT SCREEN (START SCREEN) -->
            <div class="screen select-screen active" id="selectScreen">
                <div class="player-selector-card">
                    <div class="selector-title">select players</div>
                    
                    <div class="selector-row">
                        <div class="selector-col">
                            <div class="selector-label">player A</div>
                            <div class="player-grid" id="playerGridA"></div>
                        </div>
                        <div class="selector-col">
                            <div class="selector-label">player B</div>
                            <div class="player-grid" id="playerGridB"></div>
                        </div>
                    </div>

                    <button class="start-match-btn" id="startMatchBtn">▶ start match</button>
                    
                    <div class="bottom-nav" style="margin-top:30px;">
                        <button class="nav-btn" onclick="showScreen('leaderboardScreen')">leaderboard</button>
                        <button class="nav-btn" onclick="showScreen('settingsScreen')">⚙️ settings</button>
                    </div>
                </div>
            </div>

            <!-- LEADERBOARD SCREEN (with match history) -->
            <div class="screen leaderboard-screen" id="leaderboardScreen">
                <div class="leaderboard-card">
                    <div class="leaderboard-header">
                        <span class="leaderboard-title">📈 league table</span>
                        <button class="nav-btn" onclick="showScreen('selectScreen')">← back</button>
                    </div>

                    <div class="leaderboard-table-wrapper">
                        <table id="leagueTable">
                            <thead>
                                <tr><th>player</th><th>wins</th><th>losses</th><th>games diff</th><th>win %</th></tr>
                            </thead>
                            <tbody id="leagueBody"></tbody>
                        </table>
                    </div>

                    <div class="leaderboard-title" style="font-size:1.8rem; margin:30px 0 20px;">📋 match history</div>
                    <div class="history-list" id="historyList"></div>
                </div>
            </div>

            <!-- SETTINGS SCREEN -->
            <div class="screen settings-screen" id="settingsScreen">
                <div class="settings-card">
                    <div class="settings-title">⚙️ settings / players</div>
                    
                    <div class="player-management">
                        <input type="text" id="newPlayerName" placeholder="new player name">
                        <button id="addPlayerBtn">+ add</button>
                    </div>

                    <div class="player-list-settings" id="settingsPlayerList"></div>

                    <div class="bottom-nav">
                        <button class="nav-btn" onclick="showScreen('selectScreen')">back to select</button>
                        <button class="nav-btn" onclick="showScreen('leaderboardScreen')">leaderboard</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== APP STATE ==========
        let players = ['Alex', 'Jordan', 'Casey', 'Riley'];  // default
        let matches = [];  // completed matches

        // current match
        let currentMatch = {
            p1: null,
            p2: null,
            games1: 0,
            games2: 0,
            points1: 0,
            points2: 0
        };

        // temp selection for player select screen
        let selectedA = null;
        let selectedB = null;

        // ========== FULLSCREEN TOGGLE ==========
        window.toggleFullScreen = function() {
            if (!document.fullscreenElement) {
                // Enter fullscreen
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                } else if (document.documentElement.webkitRequestFullscreen) { // Safari
                    document.documentElement.webkitRequestFullscreen();
                } else if (document.documentElement.msRequestFullscreen) { // IE/Edge
                    document.documentElement.msRequestFullscreen();
                }
            } else {
                // Exit fullscreen
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) { // Safari
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) { // IE/Edge
                    document.msExitFullscreen();
                }
            }
        };

        // ========== WINNER NOTIFICATION ==========
        let pendingWinner = null;

        window.showWinnerNotification = function() {
            if (!currentMatch.p1 || !currentMatch.p2) {
                alert('no active match');
                return;
            }
            
            // Determine current leader
            if (currentMatch.games1 > currentMatch.games2) {
                pendingWinner = currentMatch.p1;
            } else if (currentMatch.games2 > currentMatch.games1) {
                pendingWinner = currentMatch.p2;
            } else {
                alert('match is tied - keep playing!');
                return;
            }
            
            document.getElementById('winnerName').textContent = pendingWinner;
            document.getElementById('winnerNotification').classList.add('show');
        };

        // Save match
        document.getElementById('saveMatchBtn').addEventListener('click', () => {
            if (pendingWinner && currentMatch.p1 && currentMatch.p2) {
                matches.push({
                    p1: currentMatch.p1,
                    p2: currentMatch.p2,
                    setsP1: currentMatch.games1,
                    setsP2: currentMatch.games2,
                    winner: pendingWinner,
                    date: new Date().toISOString()
                });
                
                // Reset match
                currentMatch.games1 = 0;
                currentMatch.games2 = 0;
                currentMatch.points1 = 0;
                currentMatch.points2 = 0;
                
                updateMatchDisplay();
                updateLeaderboard();
                document.getElementById('winnerNotification').classList.remove('show');
                pendingWinner = null;
            }
        });

        // Dismiss winner (continue match)
        document.getElementById('dismissWinnerBtn').addEventListener('click', () => {
            document.getElementById('winnerNotification').classList.remove('show');
            pendingWinner = null;
        });

        // ========== SCREEN MANAGEMENT ==========
        window.showScreen = function(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            if (screenId === 'leaderboardScreen') updateLeaderboard();
            if (screenId === 'selectScreen') renderPlayerGrids();
            if (screenId === 'settingsScreen') renderSettingsList();
            if (screenId === 'matchScreen') updateMatchDisplay();
        };

        // ========== RENDER PLAYER GRIDS (select screen) ==========
        function renderPlayerGrids() {
            const gridA = document.getElementById('playerGridA');
            const gridB = document.getElementById('playerGridB');
            
            gridA.innerHTML = '';
            gridB.innerHTML = '';

            players.forEach(name => {
                // player A tile
                const tileA = document.createElement('div');
                tileA.className = `player-tile ${selectedA === name ? 'selected' : ''}`;
                tileA.textContent = name;
                tileA.onclick = () => {
                    selectedA = name;
                    renderPlayerGrids();
                };
                gridA.appendChild(tileA);

                // player B tile
                const tileB = document.createElement('div');
                tileB.className = `player-tile ${selectedB === name ? 'selected' : ''}`;
                tileB.textContent = name;
                tileB.onclick = () => {
                    selectedB = name;
                    renderPlayerGrids();
                };
                gridB.appendChild(tileB);
            });
        }

        // ========== START MATCH ==========
        document.getElementById('startMatchBtn').addEventListener('click', () => {
            if (!selectedA || !selectedB) {
                alert('select both players');
                return;
            }
            if (selectedA === selectedB) {
                alert('must be different players');
                return;
            }
            currentMatch = {
                p1: selectedA,
                p2: selectedB,
                games1: 0,
                games2: 0,
                points1: 0,
                points2: 0
            };
            updateMatchDisplay();
            showScreen('matchScreen');
        });

        // ========== UPDATE MATCH SCREEN ==========
        function updateMatchDisplay() {
            document.getElementById('matchPlayerAName').textContent = currentMatch.p1 || '—';
            document.getElementById('matchPlayerBName').textContent = currentMatch.p2 || '—';
            document.getElementById('matchPlayersDisplay').textContent = 
                (currentMatch.p1 || '?') + ' vs ' + (currentMatch.p2 || '?');
            document.getElementById('gamesA').textContent = currentMatch.games1;
            document.getElementById('gamesB').textContent = currentMatch.games2;
            document.getElementById('pointsA').textContent = currentMatch.points1;
            document.getElementById('pointsB').textContent = currentMatch.points2;
        }

        // ========== SCORING LOGIC ==========
        function checkGameWinner() {
            const p1 = currentMatch.points1;
            const p2 = currentMatch.points2;
            if (p1 >= 4 || p2 >= 4) {
                if (Math.abs(p1 - p2) >= 2) {
                    if (p1 > p2) currentMatch.games1++;
                    else currentMatch.games2++;
                    currentMatch.points1 = 0;
                    currentMatch.points2 = 0;
                    updateMatchDisplay();
                    
                    // Show winner notification if someone reaches 6 games by 2
                    const g1 = currentMatch.games1;
                    const g2 = currentMatch.games2;
                    if ((g1 >= 6 || g2 >= 6) && Math.abs(g1 - g2) >= 2) {
                        showWinnerNotification();
                    }
                }
            }
        }

        window.resetPoints = function() {
            currentMatch.points1 = 0;
            currentMatch.points2 = 0;
            updateMatchDisplay();
        };

        document.getElementById('pointAbtn').addEventListener('click', () => {
            if (!currentMatch.p1 || !currentMatch.p2) {
                alert('select players first');
                showScreen('selectScreen');
                return;
            }
            currentMatch.points1++;
            updateMatchDisplay();
            checkGameWinner();
        });

        document.getElementById('pointBbtn').addEventListener('click', () => {
            if (!currentMatch.p1 || !currentMatch.p2) {
                alert('select players first');
                showScreen('selectScreen');
                return;
            }
            currentMatch.points2++;
            updateMatchDisplay();
            checkGameWinner();
        });

        // ========== LEADERBOARD + HISTORY ==========
        function updateLeaderboard() {
            const stats = {};
            players.forEach(name => stats[name] = { wins:0, losses:0, gw:0, gl:0 });

            matches.forEach(m => {
                if (!stats[m.p1]) stats[m.p1] = { wins:0, losses:0, gw:0, gl:0 };
                if (!stats[m.p2]) stats[m.p2] = { wins:0, losses:0, gw:0, gl:0 };
                stats[m.p1].gw += m.setsP1;
                stats[m.p1].gl += m.setsP2;
                stats[m.p2].gw += m.setsP2;
                stats[m.p2].gl += m.setsP1;
                if (m.winner === m.p1) {
                    stats[m.p1].wins++;
                    stats[m.p2].losses++;
                } else {
                    stats[m.p2].wins++;
                    stats[m.p1].losses++;
                }
            });

            const tbody = document.getElementById('leagueBody');
            tbody.innerHTML = '';
            const sorted = Object.keys(stats).map(name => {
                const s = stats[name];
                const played = s.wins + s.losses;
                const pct = played ? (s.wins / played * 100).toFixed(1) : '0.0';
                const diff = s.gw - s.gl;
                return { name, wins: s.wins, losses: s.losses, diff, pct };
            }).sort((a,b) => b.wins - a.wins || b.diff - a.diff);

            sorted.forEach(p => {
                const row = document.createElement('tr');
                row.innerHTML = `<td><span style="font-weight:700;">${p.name}</span></td>
                    <td><span class="badge-win">${p.wins}</span></td>
                    <td>${p.losses}</td>
                    <td>${p.diff > 0 ? '+' : ''}${p.diff}</td>
                    <td>${p.pct}%</td>`;
                tbody.appendChild(row);
            });

            // history list
            const historyDiv = document.getElementById('historyList');
            historyDiv.innerHTML = '';
            if (matches.length === 0) {
                historyDiv.innerHTML = '<div style="color:#9ab0dd; text-align:center;">no matches yet</div>';
            } else {
                [...matches].reverse().slice(0, 15).forEach(m => {
                    const item = document.createElement('div');
                    item.className = 'history-item';
                    const date = new Date(m.date).toLocaleDateString();
                    item.innerHTML = `<span>${m.p1} ${m.setsP1} : ${m.setsP2} ${m.p2}</span>
                        <span class="winner-highlight">🏆 ${m.winner}</span>
                        <span style="color:#7799dd;">${date}</span>`;
                    historyDiv.appendChild(item);
                });
            }
        }

        // ========== SETTINGS / PLAYER MANAGEMENT ==========
        function renderSettingsList() {
            const list = document.getElementById('settingsPlayerList');
            list.innerHTML = '';
            players.forEach(name => {
                const row = document.createElement('div');
                row.className = 'player-row';
                row.innerHTML = `<span>${name}</span>
                    <button class="delete-player" onclick="deletePlayer('${name}')">remove</button>`;
                list.appendChild(row);
            });
        }

        window.deletePlayer = function(name) {
            if (players.length <= 2) {
                alert('need at least 2 players');
                return;
            }
            players = players.filter(p => p !== name);
            // remove from any selections
            if (selectedA === name) selectedA = null;
            if (selectedB === name) selectedB = null;
            renderSettingsList();
            renderPlayerGrids();
            updateLeaderboard();
        };

        document.getElementById('addPlayerBtn').addEventListener('click', () => {
            const input = document.getElementById('newPlayerName');
            const newName = input.value.trim();
            if (newName && !players.includes(newName)) {
                players.push(newName);
                input.value = '';
                renderSettingsList();
                renderPlayerGrids();
                updateLeaderboard();
            }
        });

        // ========== INIT ==========
        function init() {
            // Load from storage
            const savedPlayers = localStorage.getItem('tennisPlayers');
            const savedMatches = localStorage.getItem('tennisMatches');
            if (savedPlayers) {
                try { players = JSON.parse(savedPlayers); } catch(e) {}
            }
            if (savedMatches) {
                try { matches = JSON.parse(savedMatches); } catch(e) {}
            }
            
            // Start on select screen
            renderPlayerGrids();
            updateLeaderboard();
            renderSettingsList();
            updateMatchDisplay();
        }

        init();

        // auto-save
        setInterval(() => {
            localStorage.setItem('tennisPlayers', JSON.stringify(players));
            localStorage.setItem('tennisMatches', JSON.stringify(matches));
        }, 2000);
    </script>
</body>
</html>
